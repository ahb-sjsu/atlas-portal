name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (otherwise TestPyPI only)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  pypi:
    name: Build + publish research-portal
    runs-on: ubuntu-latest
    # Trusted publisher — configure at
    # https://pypi.org/manage/project/research-portal/settings/publishing/
    # with workflow name release.yml, environment name pypi.
    environment:
      name: pypi
      url: https://pypi.org/p/research-portal
    permissions:
      id-token: write  # required for OIDC trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Validate metadata
        run: twine check dist/*

      - name: Publish to TestPyPI (on dispatch without --publish)
        if: github.event_name == 'workflow_dispatch' && inputs.publish == false
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
        uses: pypa/gh-action-pypi-publish@release/v1

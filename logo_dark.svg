<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#63b3ed"/>
      <stop offset="50%" stop-color="#4299e1"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#63b3ed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#2b6cb0" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pulse1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#48bb78" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38a169" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="pulse2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecc94b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d69e2e" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="64" fill="#0f1117"/>

  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="url(#ring)" stroke-width="1.5" transform="rotate(-20, 256, 256)" opacity="0.4"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="url(#ring)" stroke-width="1.5" transform="rotate(40, 256, 256)" opacity="0.3"/>
  <ellipse cx="256" cy="256" rx="180" ry="60" fill="none" stroke="url(#ring)" stroke-width="1.5" transform="rotate(100, 256, 256)" opacity="0.2"/>

  <circle cx="256" cy="256" r="56" fill="url(#orb)" filter="url(#softglow)" opacity="0.9"/>
  <circle cx="256" cy="256" r="42" fill="none" stroke="#bee3f8" stroke-width="1" opacity="0.3"/>

  <circle cx="148" cy="198" r="14" fill="url(#pulse1)" filter="url(#glow)"/>
  <circle cx="148" cy="198" r="8" fill="#48bb78"/>
  <text x="148" y="202" fill="#0f1117" font-size="9" font-weight="700" text-anchor="middle" font-family="Consolas, monospace">0</text>

  <circle cx="370" cy="210" r="14" fill="url(#pulse2)" filter="url(#glow)"/>
  <circle cx="370" cy="210" r="8" fill="#ecc94b"/>
  <text x="370" y="214" fill="#0f1117" font-size="9" font-weight="700" text-anchor="middle" font-family="Consolas, monospace">1</text>

  <circle cx="190" cy="340" r="10" fill="#63b3ed" filter="url(#glow)" opacity="0.8"/>
  <circle cx="330" cy="320" r="10" fill="#63b3ed" filter="url(#glow)" opacity="0.6"/>
  <circle cx="280" cy="160" r="8" fill="#63b3ed" filter="url(#glow)" opacity="0.5"/>
  <circle cx="380" cy="310" r="6" fill="#4299e1" opacity="0.4"/>
  <circle cx="130" cy="280" r="6" fill="#4299e1" opacity="0.4"/>

  <line x1="190" y1="340" x2="256" y2="256" stroke="#63b3ed" stroke-width="1" opacity="0.2"/>
  <line x1="330" y1="320" x2="256" y2="256" stroke="#63b3ed" stroke-width="1" opacity="0.2"/>
  <line x1="148" y1="198" x2="256" y2="256" stroke="#48bb78" stroke-width="1.5" opacity="0.3"/>
  <line x1="370" y1="210" x2="256" y2="256" stroke="#ecc94b" stroke-width="1.5" opacity="0.3"/>
  <line x1="280" y1="160" x2="256" y2="256" stroke="#63b3ed" stroke-width="1" opacity="0.15"/>

  <text x="256" y="252" fill="#ffffff" font-size="32" font-weight="700" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="5">R</text>
  <text x="256" y="278" fill="#e2e8f0" font-size="15" font-weight="600" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" letter-spacing="7">PORTAL</text>

  <g opacity="0.06" fill="#63b3ed">
    <circle cx="80" cy="80" r="2"/><circle cx="120" cy="80" r="2"/><circle cx="160" cy="80" r="2"/>
    <circle cx="80" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="160" cy="120" r="2"/>
    <circle cx="352" cy="400" r="2"/><circle cx="392" cy="400" r="2"/><circle cx="432" cy="400" r="2"/>
    <circle cx="352" cy="440" r="2"/><circle cx="392" cy="440" r="2"/><circle cx="432" cy="440" r="2"/>
  </g>
</svg>

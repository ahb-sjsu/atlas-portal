<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Consolas, 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gpu-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="gpu-bar2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#48bb78" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#48bb78" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

